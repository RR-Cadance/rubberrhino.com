<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://cadance.music/">
  <link rel="canonical" href="https://cadance.music/">
  <title>Redirecting to Cadance Music</title>
  <script>
    (function () {
      var target = new URL('https://cadance.music/');
      target.pathname = window.location.pathname || '/';
      target.search = window.location.search || '';
      target.hash = window.location.hash || '';
      window.location.replace(target.toString());
    }());
  </script>
</head>
<body>
  <main>
    <h1>Redirecting</h1>
    <p>You are being redirected to <a href="https://cadance.music/">https://cadance.music/</a>.</p>
  </main>
</body>
</html>
